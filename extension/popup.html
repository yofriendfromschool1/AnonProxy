<!DOCTYPE html>
<html>
<head>
    <title>AnonProxy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>AnonProxy</h2>
            <p>Route traffic securely through your local node</p>
        </div>
        
        <div class="status-box">
            <span id="status-text">Status: Disconnected</span>
            <div id="status-indicator" class="indicator disconnected"></div>
        </div>

        <div class="controls">
            <label for="proxy-host">Local App Host:</label>
            <input type="text" id="proxy-host" value="127.0.0.1">
            
            <label for="proxy-port">Local App Port:</label>
            <input type="number" id="proxy-port" value="8080">
        </div>

        <button id="toggle-btn" class="enable">Connect</button>
        
        <div class="footer">
            <p>Ensure your desktop app is running before connecting.</p>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
